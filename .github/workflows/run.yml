name: 執行我的 Python 程式
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4
    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 建立資料夾並執行
      run: |
        mkdir -p crawler
        python -m pip install --upgrade pip
        pip install beautifulsoup4      # 👈 新增這一行：自動安裝爬蟲套件！
        python UI.py                    # ⚠️ 看到錯誤訊息，您的啟動檔名稱似乎是 UI.py 喔！
